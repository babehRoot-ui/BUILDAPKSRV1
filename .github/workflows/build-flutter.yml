name: 🔨 Flutter APK Builder

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: '📦 URL ZIP file Flutter source code'
        required: true
        type: string
      tag:
        description: '🏷️ Release tag'
        required: true
        type: string
      build_type:
        description: '🔧 Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - debug
          - profile
          - release
      split_abi:
        description: '📱 Split APK per ABI'
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: ⏱️ Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        run: |
          sudo apt update
          sudo apt install -y android-sdk
          echo "ANDROID_HOME=/usr/lib/android-sdk" >> $GITHUB_ENV
          echo "$ANDROID_HOME/tools/bin" >> $GITHUB_PATH

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.22.3'

      - name: 🐦 Flutter doctor
        run: flutter doctor -v

      - name: 📥 Download source code
        run: |
          mkdir -p ./source
          curl -L -o ./source.zip "${{ inputs.zip_url }}"
          unzip -q ./source.zip -d ./source
          ls -la ./source

      - name: 🔧 Prepare build environment
        run: |
          cd ./source
          if [ -f "pubspec.yaml" ]; then
            echo "✅ Flutter project detected"
          else
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi

      - name: 📦 Get dependencies
        working-directory: ./source
        run: flutter pub get

      - name: 🚀 Build APK
        working-directory: ./source
        run: |
          if [ "${{ inputs.split_abi }}" = "true" ]; then
            flutter build apk --${{ inputs.build_type }} --split-per-abi
          else
            flutter build apk --${{ inputs.build_type }}
          fi

      - name: 📤 Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk-${{ inputs.tag }}
          path: ./source/build/app/outputs/flutter-apk/*.apk
          retention-days: 7

      - name: 📤 Upload build logs (if failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ./source/build/
          retention-days: 3
