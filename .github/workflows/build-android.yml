name: 🤖 Android Studio APK Builder

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: '📦 URL ZIP file Android Studio project'
        required: true
        type: string
      tag:
        description: '🏷️ Release tag'
        required: true
        type: string
      build_variant:
        description: '🔧 Build variant'
        required: false
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: ⏱️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📥 Download project
        run: |
          mkdir -p ./project
          curl -L -o ./project.zip "${{ inputs.zip_url }}"
          unzip -q ./project.zip -d ./project
          ls -la ./project

      - name: 🔧 Make gradlew executable
        working-directory: ./project
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "❌ gradlew not found!"
            exit 1
          fi

      - name: 🚀 Build APK
        working-directory: ./project
        run: ./gradlew assemble${{ inputs.build_variant == 'release' && 'Release' || 'Debug' }}

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ inputs.tag }}
          path: ./project/app/build/outputs/apk/**/*.apk
          retention-days: 7
