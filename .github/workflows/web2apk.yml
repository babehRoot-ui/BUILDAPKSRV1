name: 🌐 Web2Apk Wrapper Builder

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: '🌐 URL website to wrap'
        required: true
        type: string
      app_name:
        description: '📱 Application name'
        required: true
        type: string
      app_package:
        description: '📦 Package name (e.g., com.example.app)'
        required: false
        default: 'com.web2apk.app'
        type: string
      icon_url:
        description: '🖼️ Icon URL (128x128 PNG)'
        required: false
        type: string
      splash_color:
        description: '🎨 Splash screen color (hex, e.g., #FFFFFF)'
        required: false
        default: '#FFFFFF'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⏱️ Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Python dependencies
        run: |
          pip install pillow jinja2

      - name: 🏗️ Generate WebView APK project
        run: |
          python scripts/web2apk.py \
            --url "${{ inputs.web_url }}" \
            --name "${{ inputs.app_name }}" \
            --package "${{ inputs.app_package }}" \
            --icon "${{ inputs.icon_url }}" \
            --splash "${{ inputs.splash_color }}" \
            --output ./output

      - name: 🚀 Build APK
        working-directory: ./output
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: web2apk-${{ inputs.app_name }}
          path: ./output/app/build/outputs/apk/release/*.apk
          retention-days: 7
